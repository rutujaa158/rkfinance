<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | R K Finance</title>

<style>

/* Page Style */

body {

font-family: 'Segoe UI', sans-serif;

margin:0;

background: linear-gradient(to right,#1d2671,#c33764);

}

/* Container */

.container {

max-width:900px;

margin:50px auto;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

}

/* Title */

h1 {

text-align:center;

color:#1d2671;

margin-bottom:30px;

}

/* Contact Grid */

.contact-grid {

display:grid;

grid-template-columns:1fr 1fr;

gap:30px;

}

/* Form */

label {

font-weight:bold;

display:block;

margin-top:10px;

}

input,
textarea {

width:100%;

padding:10px;

margin-top:5px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

}

textarea {

height:100px;

}

/* Button */

button {

margin-top:15px;

padding:12px;

background:#1d2671;

color:white;

border:none;

border-radius:10px;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover {

background:#c33764;

}

/* Info Box */

.info {

background:#f5f7fb;

padding:20px;

border-radius:10px;

}

.info p {

margin:10px 0;

}

/* Mobile Responsive */

@media(max-width:768px){

.contact-grid {

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Contact Us</h1>

<div class="contact-grid">

<!-- Contact Form -->

<div>

<h3>Send Message</h3>

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Phone</label>
<input type="tel" placeholder="Enter phone number">

<label>Message</label>
<textarea placeholder="Write your message"></textarea>

<button onclick="sendMessage()">
Submit
</button>

</div>

<!-- Company Info -->

<div class="info">

<h3>Company Information</h3>

<p><b>Company Name:</b> R K Finance Pvt Ltd</p>

<p><b>Address:</b>
Mumbai, Maharashtra, India</p>

<p><b>Phone:</b>
+00000000000</p>

<p><b>Email:</b>
support@R Kfinance.com</p>

<p><b>Working Hours:</b>
Mon - Sat (9:30 AM - 6:30 PM)</p>

</div>

</div>

</div>

<script>

function sendMessage(){

alert("Message Submitted Successfully!");

}

</script>

</body>

</html>
