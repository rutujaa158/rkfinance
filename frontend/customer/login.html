
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Login | GG Finance</title>

<style>

/* Background */

body {

margin:0;

font-family:'Segoe UI', sans-serif;

background: linear-gradient(to right,#1d2671,#c33764);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

/* Login Card */

.login-container {

background:white;

padding:35px;

border-radius:15px;

width:360px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

text-align:center;

}

/* Logo */

.logo {

font-size:26px;

font-weight:bold;

color:#1d2671;

margin-bottom:10px;

}

/* Subtitle */

.subtitle {

color:#666;

margin-bottom:25px;

}

/* Labels */

label {

display:block;

text-align:left;

font-weight:bold;

margin-top:12px;

}

/* Inputs */

input {

width:100%;

padding:12px;

margin-top:5px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

}

/* Button */

button {

width:100%;

margin-top:20px;

padding:12px;

background:#1d2671;

color:white;

border:none;

border-radius:10px;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover {

background:#c33764;

}

/* Links */

.links {

margin-top:15px;

}

.links a {

display:block;

text-decoration:none;

color:#1d2671;

margin-top:8px;

font-size:14px;

}

.links a:hover {

color:#c33764;

}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">
GG Finance
</div>

<div class="subtitle">
Customer Login Portal
</div>

<form onsubmit="return customerLogin()">

<label>Email</label>
<input type="email"
id="email"
placeholder="Enter Email"
required>

<label>Password</label>
<input type="password"
id="password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="links">

<a href="register.html">
Create New Account
</a>

<a href="../calculator.html">
Open EMI Calculator
</a>

</div>

</div>

<script>

function customerLogin(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

/* Demo Login */

if(email==="customer@gmail.com"
&& password==="12345"){

alert("Login Successful!");

/* Next page (future dashboard) */

window.location.href =
"apply-loan.html";

}

else{

alert("Invalid Login Details");

}

return false;

}

</script>

</body>

</html>
